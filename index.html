<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Hub AI | Mymensingh Polytechnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .neon-border:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transition: all 0.4s ease;
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 px-6 py-4 glass-card m-4 rounded-2xl flex justify-between items-center">
        <div class="text-2xl font-bold gradient-text tracking-tighter">TEAMHUB<span class="text-white">.AI</span></div>
        <div class="flex gap-4">
            <button onclick="showSection('home')" class="hover:text-sky-400">হোম</button>
            <button onclick="showSection('register')" class="bg-sky-600 px-5 py-2 rounded-xl font-semibold hover:bg-sky-500 shadow-lg shadow-sky-900/20">যোগ দিন</button>
        </div>
    </nav>

    <section id="home-section" class="max-w-7xl mx-auto px-6 py-10">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold mb-4 animate-pulse">স্মার্ট কোলাবরেশন পোর্টাল</h1>
            <p class="text-gray-400 text-lg">ময়মনসিংহ পলিটেকনিক ইনস্টিটিউট - CST-A স্পেশাল এডিশন</p>
        </div>

        <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <section id="register-section" class="hidden max-w-xl mx-auto px-6 py-20">
        <div class="glass-card p-10 rounded-3xl">
            <h2 class="text-3xl font-bold mb-8 text-center gradient-text">মেম্বার রেজিস্ট্রেশন</h2>
            <form id="regForm" class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">পূর্ণ নাম</label>
                    <input type="text" id="u_name" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:border-sky-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">রোল নম্বর</label>
                        <input type="number" id="u_roll" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:border-sky-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">ব্যাচ</label>
                        <input type="text" value="5/1/CST-A" disabled class="w-full bg-white/10 border border-white/10 rounded-xl p-4 text-gray-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">প্রোফাইল ফটো (URL)</label>
                    <input type="text" id="u_pic" placeholder="https://..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:border-sky-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-sky-600 to-indigo-600 py-4 rounded-xl font-bold text-lg hover:scale-105 transition-transform">অ্যাকাউন্ট তৈরি করুন</button>
            </form>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
